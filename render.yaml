services:
  # Fraud scoring API
  - type: web
    name: sentinel-fin-api
    runtime: python
    plan: free
    region: singapore
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn integration.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

  # SOC analyst dashboard
  - type: web
    name: sentinel-fin-dashboard
    runtime: python
    plan: free
    region: singapore
    branch: main
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run integration/dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: API_URL
        sync: false